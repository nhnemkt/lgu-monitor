<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LGU+ 네이버 키워드 순위 모니터링</title>
<style>
  :root {
    --bg: #f0f4f8;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #1a202c;
    --text2: #4a5568;
    --blue: #3b82f6;
    --header-bg: #1e3a5f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
         background: var(--bg); color: var(--text); font-size: 13px; }

  /* ── 헤더 ── */
  .top-bar { background: var(--header-bg); color: white; padding: 14px 24px;
             display: flex; align-items: center; justify-content: space-between; }
  .top-bar h1 { font-size: 17px; font-weight: 700; }
  .top-bar .updated { font-size: 12px; opacity: .75; }

  /* ── 스탯 카드 ── */
  .stats { display: flex; gap: 12px; padding: 16px 24px; flex-wrap: wrap; }
  .stat-card { background: var(--card); border-radius: 10px; padding: 14px 20px;
               min-width: 160px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
  .stat-card .num { font-size: 26px; font-weight: 700; color: var(--blue); }
  .stat-card .lbl { font-size: 11px; color: var(--text2); margin-top: 2px; }

  /* ── 컨트롤 바 ── */
  .controls { display: flex; gap: 10px; padding: 0 24px 14px; align-items: center; flex-wrap: wrap; }
  .controls label { font-size: 12px; color: var(--text2); margin-right: 4px; }
  .controls select, .controls input[type=text] {
    border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px;
    font-size: 13px; background: white; }
  .toggle-wrap { display: flex; border: 1px solid var(--border); border-radius: 6px;
                 overflow: hidden; }
  .toggle-wrap button { padding: 6px 18px; border: none; background: white;
    cursor: pointer; font-size: 13px; transition: all .15s; }
  .toggle-wrap button.active { background: var(--blue); color: white; }

  /* ── 테이블 ── */
  .table-wrap { padding: 0 24px 32px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; background: var(--card);
          border-radius: 10px; overflow: hidden;
          box-shadow: 0 1px 4px rgba(0,0,0,.07); }
  th { background: var(--header-bg); color: white; padding: 9px 10px;
       text-align: center; font-weight: 600; font-size: 12px; white-space: nowrap; }
  th.kw-col { text-align: left; min-width: 160px; }
  td { padding: 7px 10px; border-bottom: 1px solid var(--border);
       text-align: center; font-size: 12px; }
  td.kw-cell { text-align: left; font-weight: 500; white-space: nowrap; }
  tr:hover td { background: #f7faff; }
  tr.hidden { display: none; }

  /* ── 순위 뱃지 ── */
  .rank { display: inline-block; padding: 2px 8px; border-radius: 12px;
          font-weight: 700; font-size: 12px; }
  .r1   { background: #d1fae5; color: #065f46; }   /* 1위  */
  .r2   { background: #dbeafe; color: #1e40af; }   /* 2위  */
  .r3   { background: #fef9c3; color: #854d0e; }   /* 3위  */
  .r4   { background: #ffedd5; color: #9a3412; }   /* 4-5위 */
  .r5   { background: #fee2e2; color: #991b1b; }   /* 6위+ */
  .rx   { background: #fecaca; color: #7f1d1d; }   /* X   */
  .rhome { background: #ede9fe; color: #5b21b6; }  /* (홈) */
  .rmob  { background: #fae8ff; color: #86198f; }  /* (모바일) */

  /* ── 날짜 탭 ── */
  .date-tabs { display: flex; gap: 6px; padding: 0 24px 12px; flex-wrap: wrap; }
  .date-tab { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: white; cursor: pointer; font-size: 12px; transition: all .15s; }
  .date-tab.active { background: var(--blue); color: white; border-color: var(--blue); }

  /* ── 빈 셀 ── */
  .empty { color: #cbd5e0; }
</style>
  <meta http-equiv="refresh" content="3600">
</head>
<body>

<div class="top-bar">
  <h1>📊 LGU+ 네이버 키워드 순위 모니터링</h1>
  <span class="updated" id="updated"></span>
</div>

<div class="stats" id="stats"></div>

<div class="date-tabs" id="dateTabs"></div>

<div class="controls">
  <div>
    <label>디바이스</label>
    <div class="toggle-wrap">
      <button class="active" id="btnPC" onclick="setDevice('PC')">PC</button>
      <button id="btnMob" onclick="setDevice('모바일')">모바일</button>
    </div>
  </div>
  <div>
    <label>키워드 검색</label>
    <input type="text" id="kwSearch" placeholder="키워드 입력..." oninput="filterTable()" style="width:200px">
  </div>
</div>

<div class="table-wrap">
  <table id="rankTable">
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

const HOURS = [9,10,11,12,14,15,16,17,18];
let currentDate   = '';
let currentDevice = 'PC';

function init() {
  document.getElementById('updated').textContent =
    '마지막 업데이트: ' + (DB.last_updated || '-');

  const dates = Object.keys(DB.data || {}).sort().reverse();
  if (!dates.length) {
    document.getElementById('tableBody').innerHTML =
      '<tr><td colspan="20" style="text-align:center;padding:40px;color:#999">아직 수집된 데이터가 없습니다.</td></tr>';
    return;
  }
  currentDate = dates[0];

  // 날짜 탭
  const tabWrap = document.getElementById('dateTabs');
  dates.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'date-tab' + (d === currentDate ? ' active' : '');
    btn.textContent = d;
    btn.onclick = () => selectDate(d);
    tabWrap.appendChild(btn);
  });

  renderAll();
}

function selectDate(d) {
  currentDate = d;
  document.querySelectorAll('.date-tab').forEach(b => {
    b.classList.toggle('active', b.textContent === d);
  });
  renderAll();
}

function setDevice(dev) {
  currentDevice = dev;
  document.getElementById('btnPC').classList.toggle('active', dev === 'PC');
  document.getElementById('btnMob').classList.toggle('active', dev === '모바일');
  renderAll();
}

function rankClass(val) {
  if (!val || val === '') return '';
  if (val === 'X')       return 'rx';
  if (val.startsWith('(홈)'))    return 'rhome';
  if (val.startsWith('(모바일)')) return 'rmob';
  const n = parseInt(val);
  if (n === 1) return 'r1';
  if (n === 2) return 'r2';
  if (n === 3) return 'r3';
  if (n <= 5)  return 'r4';
  return 'r5';
}

  HOURS.forEach(h => { headHtml += `<th>${h}시</th>`; });
  headHtml += '</tr>';
  head.innerHTML = headHtml;

  // 바디
  const body = document.getElementById('tableBody');
  let bodyHtml = '';
  (DB.keywords || []).forEach(kw => {
    bodyHtml += `<tr data-kw="${kw}"><td class="kw-cell">${kw}</td>`;
    HOURS.forEach(h => {
      const hData = dayData[String(h)] || {};
      const val   = (hData[kw] || {})[currentDevice] || '';
      const cls   = rankClass(val);
      bodyHtml += val
        ? `<td><span class="rank ${cls}">${val}</span></td>`
        : `<td class="empty">-</td>`;
    });
    bodyHtml += '</tr>';
  });
  body.innerHTML = bodyHtml;

  // 통계
  renderStats(dayData);
  filterTable();
}

function renderStats(dayData) {
  const keywords = DB.keywords || [];
  let total1 = 0, totalX = 0, collected = 0;

  keywords.forEach(kw => {
    HOURS.forEach(h => {
      const val = ((dayData[String(h)] || {})[kw] || {})[currentDevice];
      if (val) {
        collected++;
        if (val === 'X') totalX++;
        else if (val === '1위' || val.endsWith('1위')) total1++;
      }
    });
  });

  document.getElementById('stats').innerHTML = `
    <div class="stat-card">
      <div class="num">${keywords.length}</div>
      <div class="lbl">모니터링 키워드 수</div>
    </div>
    <div class="stat-card">
      <div class="num" style="color:#065f46">${total1}</div>
      <div class="lbl">1위 달성 건수 (오늘)</div>
    </div>
    <div class="stat-card">
      <div class="num" style="color:#991b1b">${totalX}</div>
      <div class="lbl">광고 미노출 건수 (X)</div>
    </div>
    <div class="stat-card">
      <div class="num" style="color:#1e40af">${collected}</div>
      <div class="lbl">수집 완료 데이터</div>
    </div>`;
}

function filterTable() {
  const q = document.getElementById('kwSearch').value.trim().toLowerCase();
  document.querySelectorAll('#tableBody tr').forEach(tr => {
    const kw = (tr.dataset.kw || '').toLowerCase();
    tr.classList.toggle('hidden', !!q && !kw.includes(q));
  });
}

init();
</script>
</body>
</html>
